name: CI/CD — Vault Homes

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Run tests
        run: npm test -- --passWithNoTests --ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://vaulthomes.com
          NEXT_PUBLIC_WHATSAPP_NUMBER: "2348117682654"
          NEXT_PUBLIC_GA4_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA4_MEASUREMENT_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}

  # Vercel deployment is handled automatically via Vercel GitHub integration
  # The build job above acts as the quality gate before Vercel deploys
